name: Publish Docker Images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/janus-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/janus-frontend

jobs:
  publish:
    name: Build and Push Images
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Backend ───────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build backend JAR
        working-directory: janus-backend
        run: ./gradlew build -x test

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: janus-backend
          file: janus-backend/src/main/docker/Dockerfile.jvm
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # ── Frontend ──────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: janus-frontend
          file: janus-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
