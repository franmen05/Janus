services:
  janus-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: janusdb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - janus-internal

  janus-backend:
    image: ghcr.io/franmen05/janus-backend:latest
    restart: unless-stopped
    environment:
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://janus-db:5432/janusdb
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - backend_storage:/deployments/storage
    depends_on:
      janus-db:
        condition: service_healthy
    networks:
      - janus-internal
      - shared_network

  janus-frontend:
    image: ghcr.io/franmen05/janus-frontend:latest
    restart: unless-stopped
    networks:
      - shared_network

volumes:
  postgres_data:
  backend_storage:

networks:
  janus-internal:
    driver: bridge
  shared_network:
    external: true
